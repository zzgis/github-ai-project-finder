name: 每日AI项目发现

on:
  schedule:
    # 测试：每5分钟触发一次
    - cron: '*/5 * * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  discover-ai-projects:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行AI项目发现脚本
        run: python github_ai_projects.py --email
        env:
          SMTP_ENABLED: ${{ secrets.SMTP_ENABLED }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_SENDER: ${{ secrets.SMTP_SENDER }}
          SMTP_RECIPIENT: ${{ secrets.SMTP_RECIPIENT }}
          AI_API_ENDPOINT: ${{ secrets.AI_API_ENDPOINT }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_MODEL: ${{ secrets.AI_MODEL }}

      - name: 提交结果到仓库
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ai_projects/
          # 只在有新文件时提交
          git diff --staged --quiet || git commit -m "更新AI项目发现报告 $(date +'%Y-%m-%d')"
          git push origin master